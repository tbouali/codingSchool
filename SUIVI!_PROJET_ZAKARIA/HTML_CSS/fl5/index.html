
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox-5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Partie gauche -->
        <div class="left">

            <div class="box top-box">1</div>

            <div class="box top-box">2</div>

            <div class="group-vertical">
                <div class="box small-box">1</div>
                <div class="box small-box">2</div>
                <div class="box small-box">3</div>
            </div>

            <div class="group-horizontal">
                <div class="box">1</div>
                <div class="box">2</div>
                <div class="box">3</div>
                <div class="box">4</div>
                <div class="box">5</div>
            </div>

        </div>

        <!-- Partie droite -->
        <div class="right">

            <div class="box big-box">3</div>

            <div class="middle">
                <div class="box">4</div>
                <div class="box">5</div>
            </div>

            <div class="box bottom-box">6</div>

            <div class="box bottom-box">7</div>

        </div>

    </div>

</body>
</html>

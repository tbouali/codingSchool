<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid-5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Colonne gauche -->
    <div class="gauche">

        <div class="box">1</div>
        <div class="box">2</div>

        <div class="vertical">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>

        <div class="horizontal">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
        </div>

    </div>

    <!-- Colonne droite -->
    <div class="droite">

        <div class="box grand">3</div>

        <div class="milieu">
            <div class="box">4</div>
            <div class="box">5</div>
        </div>

        <div class="box">6</div>
        <div class="box">7</div>

    </div>

</div>

</body>
</html>
